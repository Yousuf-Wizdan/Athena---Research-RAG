<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">Athena RAG System Architecture</title>
  <desc id="arch-desc">Three-layer architecture: Browser with React UI at top, Next.js 16 API routes in the middle, Neon PostgreSQL and Qdrant Cloud databases and Mistral/OpenAI AI providers at the bottom.</desc>

  <defs>
    <linearGradient id="arch-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#1A1714"/>
    </linearGradient>
    <linearGradient id="amber-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4783C"/>
      <stop offset="100%" stop-color="#B8943C"/>
    </linearGradient>
    <linearGradient id="line-down" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4783C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4783C" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" rx="16" fill="url(#arch-bg)"/>

  <!-- Title -->
  <text x="56" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#E6DCC3" font-weight="600">Architecture</text>
  <line x1="56" y1="62" x2="240" y2="62" stroke="url(#amber-bar)" stroke-width="2"/>

  <!-- ===== LAYER 1: BROWSER ===== -->
  <g transform="translate(0 80)">
    <rect x="350" y="0" width="500" height="90" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="350" y="0" width="500" height="4" rx="2" fill="url(#amber-bar)"/>
    <text x="600" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#D4783C" font-weight="600" text-anchor="middle" letter-spacing="1.5">BROWSER</text>
    <text x="600" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#E6DCC3" font-weight="500" text-anchor="middle">React 19 + Tailwind CSS + shadcn/ui</text>
    <text x="600" y="78" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">PaperUpload &#183; ChatThread &#183; SynthesisPortal &#183; Search</text>
  </g>

  <!-- Arrow: Browser → API -->
  <line x1="600" y1="170" x2="600" y2="200" stroke="url(#line-down)" stroke-width="1.5"/>
  <polygon points="594,198 600,208 606,198" fill="#D4783C" fill-opacity="0.4"/>

  <!-- ===== LAYER 2: NEXT.JS API ===== -->
  <g transform="translate(0 210)">
    <rect x="200" y="0" width="800" height="100" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="200" y="0" width="800" height="4" rx="2" fill="url(#amber-bar)"/>
    <text x="600" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#D4783C" font-weight="600" text-anchor="middle" letter-spacing="1.5">NEXT.JS 16 APP ROUTER</text>
    <text x="600" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#E6DCC3" text-anchor="middle">Vercel Edge Functions &#183; Serverless API Routes</text>

    <!-- API route pills -->
    <rect x="230" y="64" width="130" height="24" rx="6" fill="#141210" stroke="#36302A" stroke-width="0.5"/>
    <text x="295" y="80" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#B8943C" text-anchor="middle">/api/papers/upload</text>

    <rect x="372" y="64" width="135" height="24" rx="6" fill="#141210" stroke="#36302A" stroke-width="0.5"/>
    <text x="439" y="80" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#B8943C" text-anchor="middle">/api/papers/search</text>

    <rect x="519" y="64" width="125" height="24" rx="6" fill="#141210" stroke="#36302A" stroke-width="0.5"/>
    <text x="581" y="80" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#B8943C" text-anchor="middle">/api/papers/chat</text>

    <rect x="656" y="64" width="145" height="24" rx="6" fill="#141210" stroke="#36302A" stroke-width="0.5"/>
    <text x="728" y="80" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#B8943C" text-anchor="middle">/api/papers/synthesis</text>

    <rect x="813" y="64" width="110" height="24" rx="6" fill="#141210" stroke="#36302A" stroke-width="0.5"/>
    <text x="868" y="80" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#B8943C" text-anchor="middle">/api/auth/*</text>
  </g>

  <!-- Arrow: API → DB left -->
  <line x1="320" y1="310" x2="320" y2="340" stroke="url(#line-down)" stroke-width="1.5"/>
  <polygon points="314,338 320,348 326,338" fill="#D4783C" fill-opacity="0.4"/>

  <!-- Arrow: API → DB right -->
  <line x1="460" y1="310" x2="460" y2="340" stroke="url(#line-down)" stroke-width="1.5"/>
  <polygon points="454,338 460,348 466,338" fill="#D4783C" fill-opacity="0.4"/>

  <!-- Arrow: API → AI left -->
  <line x1="740" y1="310" x2="740" y2="340" stroke="url(#line-down)" stroke-width="1.5"/>
  <polygon points="734,338 740,348 746,338" fill="#D4783C" fill-opacity="0.4"/>

  <!-- Arrow: API → AI right -->
  <line x1="880" y1="310" x2="880" y2="340" stroke="url(#line-down)" stroke-width="1.5"/>
  <polygon points="874,338 880,348 886,338" fill="#D4783C" fill-opacity="0.4"/>

  <!-- ===== LAYER 3A: DATABASES ===== -->
  <g transform="translate(0 350)">
    <!-- Neon PostgreSQL -->
    <rect x="200" y="0" width="240" height="110" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="200" y="0" width="240" height="4" rx="2" fill="#5A8A7C"/>
    <text x="320" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5A8A7C" font-weight="600" text-anchor="middle" letter-spacing="1">NEON POSTGRES</text>
    <text x="320" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#E6DCC3" text-anchor="middle">Prisma ORM</text>
    <text x="320" y="72" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">Users &#183; Sessions</text>
    <text x="320" y="88" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">Papers &#183; Threads &#183; Messages</text>
    <text x="320" y="104" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">Lexical full-text search</text>

    <!-- Qdrant Cloud -->
    <rect x="460" y="0" width="240" height="110" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="460" y="0" width="240" height="4" rx="2" fill="#B8943C"/>
    <text x="580" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#B8943C" font-weight="600" text-anchor="middle" letter-spacing="1">QDRANT CLOUD</text>
    <text x="580" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#E6DCC3" text-anchor="middle">Vector Database</text>
    <text x="580" y="72" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">1024-dim cosine vectors</text>
    <text x="580" y="88" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">Payload keyword filters</text>
    <text x="580" y="104" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">Per-user multi-tenancy</text>
  </g>

  <!-- ===== LAYER 3B: AI PROVIDERS ===== -->
  <g transform="translate(0 350)">
    <!-- Mistral -->
    <rect x="740" y="0" width="140" height="110" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="740" y="0" width="140" height="4" rx="2" fill="#D4783C"/>
    <text x="810" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#D4783C" font-weight="600" text-anchor="middle" letter-spacing="1">MISTRAL</text>
    <text x="810" y="56" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">mistral-embed</text>
    <text x="810" y="76" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">LLM chat</text>

    <!-- OpenAI -->
    <rect x="900" y="0" width="140" height="110" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="900" y="0" width="140" height="4" rx="2" fill="#D4783C"/>
    <text x="970" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#D4783C" font-weight="600" text-anchor="middle" letter-spacing="1">OPENAI</text>
    <text x="970" y="56" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">text-embedding-3-large</text>
    <text x="970" y="76" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#9F907E" text-anchor="middle">LLM chat</text>
  </g>

  <!-- Bottom indicator -->
  <text x="600" y="486" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">Data flows through LangChain orchestration &#183; Auth via JWT + bcrypt</text>
</svg>
