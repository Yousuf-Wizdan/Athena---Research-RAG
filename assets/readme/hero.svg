<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Athena RAG — Research Intelligence Platform</title>
  <desc id="hero-desc">Upload research papers, ask questions, and get AI-powered answers with real source citations. Visual pipeline: PDF document, text chunks, vector search, LLM generation, cited answer with paper references.</desc>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#1A1714"/>
    </linearGradient>
    <linearGradient id="omega-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E08950"/>
      <stop offset="100%" stop-color="#B8943C"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4783C"/>
      <stop offset="100%" stop-color="#B8943C"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4783C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4783C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrow-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4783C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B8943C" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="16" fill="url(#bg-grad)"/>

  <!-- Subtle grid dots -->
  <g fill="#36302A" fill-opacity="0.3">
    <circle cx="40" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="200" cy="120" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/>
    <circle cx="40" cy="280" r="1.5"/><circle cx="120" cy="280" r="1.5"/><circle cx="200" cy="280" r="1.5"/>
    <circle cx="40" cy="340" r="1.5"/><circle cx="120" cy="340" r="1.5"/><circle cx="200" cy="340" r="1.5"/>
  </g>

  <!-- Background accent glow -->
  <circle cx="160" cy="160" r="140" fill="#D4783C" fill-opacity="0.04"/>

  <!-- ===== LEFT SIDE: BRANDING ===== -->

  <!-- Omega symbol -->
  <text x="56" y="102" font-family="Georgia, 'Times New Roman', serif" font-size="68" fill="url(#omega-grad)" font-weight="700">&#x03A9;</text>

  <!-- Athena name -->
  <text x="56" y="175" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#E6DCC3" font-weight="600" letter-spacing="-0.5">Athena</text>

  <!-- RAG badge -->
  <rect x="210" y="137" width="56" height="26" rx="6" fill="#D4783C" fill-opacity="0.15"/>
  <text x="216" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#D4783C" font-weight="700" letter-spacing="1">RAG</text>

  <!-- Tagline -->
  <text x="56" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#9F907E" font-weight="400">Upload research papers. Ask questions.</text>
  <text x="56" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#9F907E" font-weight="400">Get cited AI answers.</text>

  <!-- Divider line -->
  <line x1="56" y1="275" x2="440" y2="275" stroke="url(#line-fade)" stroke-width="1"/>

  <!-- Metadata pills -->
  <rect x="56" y="296" width="74" height="26" rx="13" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
  <text x="66" y="313" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#B8943C">Next.js</text>

  <rect x="142" y="296" width="80" height="26" rx="13" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
  <text x="152" y="313" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#B8943C">TypeScript</text>

  <rect x="234" y="296" width="68" height="26" rx="13" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
  <text x="244" y="313" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#B8943C">Qdrant</text>

  <rect x="56" y="332" width="100" height="26" rx="13" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
  <text x="66" y="349" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#B8943C">PostgreSQL</text>

  <rect x="168" y="332" width="70" height="26" rx="13" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
  <text x="178" y="349" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#B8943C">Mistral</text>

  <!-- ===== RIGHT SIDE: PIPELINE VISUAL ===== -->

  <g transform="translate(560 48)">
    <!-- Step 1: PDF Upload -->
    <rect x="0" y="0" width="140" height="130" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="4" rx="2" fill="url(#accent-bar)"/>
    <text x="70" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" text-anchor="middle">&#x1F4C4;</text>
    <text x="70" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#E6DCC3" font-weight="500" text-anchor="middle">Upload PDF</text>
    <text x="70" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">Extract text</text>
    <text x="70" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">LLM metadata</text>

    <!-- Arrow 1 -->
    <line x1="152" y1="65" x2="190" y2="65" stroke="url(#arrow-fade)" stroke-width="1.5"/>
    <polygon points="188,59 198,65 188,71" fill="#D4783C" fill-opacity="0.5"/>

    <!-- Step 2: Chunk & Embed -->
    <rect x="200" y="0" width="140" height="130" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="200" y="0" width="140" height="4" rx="2" fill="url(#accent-bar)"/>
    <text x="270" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" text-anchor="middle">&#x1F9E0;</text>
    <text x="270" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#E6DCC3" font-weight="500" text-anchor="middle">Chunk &amp; Embed</text>
    <text x="270" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">1K-token chunks</text>
    <text x="270" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">1024-dim vectors</text>

    <!-- Arrow 2 -->
    <line x1="352" y1="65" x2="390" y2="65" stroke="url(#arrow-fade)" stroke-width="1.5"/>
    <polygon points="388,59 398,65 388,71" fill="#D4783C" fill-opacity="0.5"/>

    <!-- Step 3: Vector Search -->
    <rect x="400" y="0" width="140" height="130" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="400" y="0" width="140" height="4" rx="2" fill="url(#accent-bar)"/>
    <text x="470" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" text-anchor="middle">&#x1F50D;</text>
    <text x="470" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#E6DCC3" font-weight="500" text-anchor="middle">Search</text>
    <text x="470" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">Cosine similarity</text>
    <text x="470" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">User isolation</text>

    <!-- Arrow 3 -->
    <line x1="552" y1="65" x2="590" y2="65" stroke="url(#arrow-fade)" stroke-width="1.5"/>
    <polygon points="588,59 598,65 588,71" fill="#D4783C" fill-opacity="0.5"/>

    <!-- Step 4: AI Answer -->
    <rect x="600" y="0" width="140" height="130" rx="10" fill="#1E1B18" stroke="#36302A" stroke-width="1"/>
    <rect x="600" y="0" width="140" height="4" rx="2" fill="url(#accent-bar)"/>
    <text x="670" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" text-anchor="middle">&#x2728;</text>
    <text x="670" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#E6DCC3" font-weight="500" text-anchor="middle">Cited Answer</text>
    <text x="670" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">Streaming LLM</text>
    <text x="670" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9F907E" text-anchor="middle">Source attribution</text>
  </g>

  <!-- Decorative bottom-right line -->
  <line x1="1140" y1="340" x2="1140" y2="40" stroke="#36302A" stroke-width="1" stroke-opacity="0.3"/>
</svg>
